name: Build Xray Lib

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-aar:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;26.1.10909125" "platforms;android-34"

      - name: Clone AndroidLibXrayLite
        run: git clone --depth 1 https://github.com/2dust/AndroidLibXrayLite.git lib

      - name: Build AAR with gomobile
        working-directory: lib
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile init
          go mod tidy -v
          gomobile bind -v -androidapi 21 -ldflags='-s -w' -o libv2ray.aar ./

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: libv2ray-aar
          path: lib/libv2ray.aar

      - name: Release AAR
        uses: softprops/action-gh-release@v2
        with:
          tag_name: xray-lib
          name: Xray Native Lib
          body: "Prebuilt libv2ray.aar for embedding"
          files: lib/libv2ray.aar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
