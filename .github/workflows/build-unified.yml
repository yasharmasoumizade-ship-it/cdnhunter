name: Build CDN Hunter (VPN + Scanner)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/build-unified.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'

      - name: Install SDK + NDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;26.1.10909125"

      - name: Build libv2ray.aar (xray-core native)
        run: |
          git clone --depth 1 https://github.com/2dust/AndroidLibXrayLite.git xray-lib
          cd xray-lib
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile init
          go mod tidy -v
          gomobile bind -v -androidapi 21 -ldflags='-s -w' -o libv2ray.aar ./
          ls -la libv2ray.aar

      - name: Place .aar in app/libs
        run: |
          mkdir -p android/app/libs
          cp xray-lib/libv2ray.aar android/app/libs/
          ls -la android/app/libs/

      - name: Build hev-socks5-tunnel .so
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          git clone --depth 1 --recursive https://github.com/heiher/hev-socks5-tunnel.git /tmp/hev
          cd /tmp/hev
          find . -name "cc.h" -exec sed -i 's/typedef __kernel_fd_set fd_set;//g' {} \;
          NDK="${ANDROID_HOME}/ndk/26.1.10909125"
          
          export CC="${NDK}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang"
          export STRIP="${NDK}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"
          
          find . -name "Makefile" -exec sed -i 's/-lpthread//g' {} \;
          find . -name "*.mk" -exec sed -i 's/-lpthread//g' {} \;
          
          # Compile main project
          make CC="$CC" CFLAGS="-fPIC -DANDROID -O2 -Wno-typedef-redefinition" -j$(nproc) 2>&1 | tail -5 || true
          
          # CRITICAL: Compile hev-jni.c separately with correct defines
          $CC -c -fPIC -DANDROID -DPKGNAME=hev/htproxy -DCLSNAME=TProxyService -O2 -Wno-typedef-redefinition \
            -I src -I src/core/include -I third-part/hev-task-system/include \
            -I third-part/lwip/src/include -I third-part/lwip/src/ports/include \
            -I third-part/yaml/include \
            src/hev-jni.c -o build/hev-jni.o
          
          # Collect ALL .o files including hev-jni.o
          OBJS=$(find build -name "*.o" 2>/dev/null | sort | tr '\n' ' ')
          OBJ_COUNT=$(echo $OBJS | wc -w)
          echo "Found $OBJ_COUNT object files (includes hev-jni.o)"
          
          if [ "$OBJ_COUNT" -gt "10" ]; then
            $CC -shared -Wl,-soname,libhev-socks5-tunnel.so -o libhev-socks5-tunnel.so $OBJS -llog
            $STRIP libhev-socks5-tunnel.so
            file libhev-socks5-tunnel.so
            echo "=== Checking JNI_OnLoad ==="
            ${NDK}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-nm -D libhev-socks5-tunnel.so | grep "JNI_OnLoad" && echo "SUCCESS" || echo "FATAL: NOT FOUND"
            cp libhev-socks5-tunnel.so ${GITHUB_WORKSPACE}/android/app/src/main/jniLibs/arm64-v8a/
          else
            echo "ERROR: Not enough objects"
            exit 1
          fi
          
          ls -la ${GITHUB_WORKSPACE}/android/app/src/main/jniLibs/arm64-v8a/

      - name: Bundle geoip/geosite assets
        run: |
          mkdir -p android/app/src/main/assets
          curl -sL "https://github.com/v2fly/geoip/releases/latest/download/geoip.dat" -o android/app/src/main/assets/geoip.dat
          curl -sL "https://github.com/v2fly/domain-list-community/releases/latest/download/dlc.dat" -o android/app/src/main/assets/geosite.dat
          ls -la android/app/src/main/assets/

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o /tmp/gradle.zip
          unzip -qo /tmp/gradle.zip -d /tmp
          /tmp/gradle-8.5/bin/gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Collect APK
        run: |
          mkdir -p out
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "Found: $APK"
          test -n "$APK" && cp "$APK" out/CDN-Hunter-v3.apk
          ls -la out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CDN-Hunter-v3
          path: out/CDN-Hunter-v3.apk

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.0-build${{ github.run_number }}
          name: CDN Hunter v3.0 (Build ${{ github.run_number }})
          body: |
            ## CDN Hunter v3.0 — VPN + Scanner

            Full Compose app with embedded Xray VPN engine.

            ### Features:
            - Xray VPN (trojan/vless/vmess)
            - TLS Fragmentation (bypass DPI)
            - CDN clean-IP scanner (Cloudflare/Fastly/Akamai)
            - Auto-IP (scan + apply best IP)
            - Traffic stats (upload/download)
            - Speed monitor
          files: out/CDN-Hunter-v3.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
