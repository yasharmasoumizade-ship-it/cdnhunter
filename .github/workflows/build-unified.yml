name: Build CDN Hunter (VPN + Scanner)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'vpn-overlay/hev-jni.c'
      - '.github/workflows/build-unified.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'

      - name: Install SDK + NDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;26.1.10909125"

      - name: Build libv2ray.aar (xray-core native)
        run: |
          git clone --depth 1 https://github.com/2dust/AndroidLibXrayLite.git xray-lib
          cd xray-lib
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile init
          go mod tidy -v
          # -checklinkname=0 is REQUIRED for Go 1.23+ because anet uses
          # //go:linkname to access net.zoneCache (see wlynxg/anet README).
          gomobile bind -v -androidapi 21 -ldflags='-s -w -checklinkname=0' -o libv2ray.aar ./
          ls -la libv2ray.aar

      - name: Place .aar in app/libs
        run: |
          mkdir -p android/app/libs
          cp xray-lib/libv2ray.aar android/app/libs/
          ls -la android/app/libs/

      - name: Build hev-socks5-tunnel .so with our own JNI bridge
        run: |
          set -euo pipefail
          NDK="${ANDROID_HOME}/ndk/26.1.10909125"

          # Clone with submodules (yaml, lwip, hev-task-system) — required by the lib's build.mk
          git clone --depth 1 --recursive https://github.com/heiher/hev-socks5-tunnel.git /tmp/hev

          # IMPORTANT: current upstream hev-socks5-tunnel ships NO Java/JNI wrapper —
          # only a pure C API (hev_socks5_tunnel_main_from_file/_quit/_stats in
          # src/hev-main.h). Its own Android.mk only builds the .so as a C library,
          # with no PKGNAME/CLSNAME mechanism and no Java-callable symbols at all.
          # Using it as-is meant our TProxyService.java's native methods never
          # existed in the compiled .so — System.loadLibrary succeeded (the .so is
          # valid), but calling any native method threw NoSuchMethodError. That is
          # the exact crash seen at connect time.
          #
          # Fix: build our own thin JNI glue (hev-jni.c, from vpn-overlay/) as an
          # extra source in the same shared library, wired up via our own
          # Android.mk that reuses the upstream lib's Android.mk for the tunnel
          # sources/static deps, then adds our JNI file + JNI headers on top.
          cp vpn-overlay/hev-jni.c /tmp/hev/hev-jni.c

          cat > /tmp/hev/Android-bridge.mk <<'EOF'
          TOP_PATH := $(call my-dir)
          ifeq ($(filter $(modules-get-list),yaml),)
          include $(TOP_PATH)/third-part/yaml/Android.mk
          endif
          ifeq ($(filter $(modules-get-list),lwip),)
          include $(TOP_PATH)/third-part/lwip/Android.mk
          endif
          ifeq ($(filter $(modules-get-list),hev-task-system),)
          include $(TOP_PATH)/third-part/hev-task-system/Android.mk
          endif
          LOCAL_PATH = $(TOP_PATH)
          SRCDIR := $(LOCAL_PATH)/src
          include $(CLEAR_VARS)
          include $(LOCAL_PATH)/build.mk
          LOCAL_MODULE := hev-socks5-tunnel
          LOCAL_SRC_FILES := $(patsubst $(SRCDIR)/%,src/%,$(SRCFILES)) hev-jni.c
          LOCAL_C_INCLUDES := \
            $(LOCAL_PATH)/src \
            $(LOCAL_PATH)/src/misc \
            $(LOCAL_PATH)/src/core/include \
            $(LOCAL_PATH)/third-part/yaml/include \
            $(LOCAL_PATH)/third-part/lwip/src/include \
            $(LOCAL_PATH)/third-part/lwip/src/ports/include \
            $(LOCAL_PATH)/third-part/hev-task-system/include
          LOCAL_CFLAGS += -DFD_SET_DEFINED -DSOCKLEN_T_DEFINED -DENABLE_LIBRARY -DANDROID
          ifeq ($(TARGET_ARCH_ABI),armeabi-v7a)
          LOCAL_CFLAGS += -mfpu=neon
          endif
          LOCAL_LDLIBS := -llog
          LOCAL_STATIC_LIBRARIES := yaml lwip hev-task-system
          LOCAL_LDFLAGS += -Wl,-z,max-page-size=16384
          LOCAL_LDFLAGS += -Wl,-z,common-page-size=16384
          include $(BUILD_SHARED_LIBRARY)
          EOF
          # (heredoc above is indented to match the run block; strip leading
          # whitespace so make doesn't choke on indented directives)
          sed -i 's/^          //' /tmp/hev/Android-bridge.mk

          "$NDK/ndk-build" \
            NDK_PROJECT_PATH=/tmp/hev \
            APP_BUILD_SCRIPT=/tmp/hev/Android-bridge.mk \
            NDK_APPLICATION_MK=/tmp/hev/Application.mk \
            APP_ABI="arm64-v8a armeabi-v7a" \
            APP_PLATFORM=android-24 \
            NDK_LIBS_OUT=/tmp/hev/libs \
            NDK_OUT=/tmp/hev/obj \
            -j"$(nproc)"

          # Copy the built .so for each ABI into jniLibs
          mkdir -p android/app/src/main/jniLibs
          cp -r /tmp/hev/libs/* android/app/src/main/jniLibs/

          echo "=== jniLibs contents ==="
          find android/app/src/main/jniLibs -name "*.so" -exec ls -la {} \;

          # Verify our actual JNI methods are exported (this is what matters —
          # JNI_OnLoad is irrelevant here since we use static native binding,
          # i.e. plain `System.loadLibrary` + `private static native ...`, not
          # RegisterNatives via JNI_OnLoad).
          echo "=== Verify TProxyService symbols are exported (arm64-v8a) ==="
          SO="android/app/src/main/jniLibs/arm64-v8a/libhev-socks5-tunnel.so"
          READELF="${NDK}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-readelf"
          "$READELF" --dyn-syms "$SO" | grep "TProxy" || true
          for sym in TProxyStartService TProxyStopService TProxyGetStats; do
            if "$READELF" --dyn-syms "$SO" | grep -q "Java_hev_htproxy_TProxyService_$sym"; then
              echo "OK: $sym exported"
            else
              echo "ERROR: $sym NOT exported — build is broken" && exit 1
            fi
          done

      - name: Bundle geoip/geosite assets
        run: |
          mkdir -p android/app/src/main/assets
          curl -sL "https://github.com/v2fly/geoip/releases/latest/download/geoip.dat" -o android/app/src/main/assets/geoip.dat
          curl -sL "https://github.com/v2fly/domain-list-community/releases/latest/download/dlc.dat" -o android/app/src/main/assets/geosite.dat
          ls -la android/app/src/main/assets/

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o /tmp/gradle.zip
          unzip -qo /tmp/gradle.zip -d /tmp
          /tmp/gradle-8.5/bin/gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Collect APK
        run: |
          mkdir -p out
          find android/app/build/outputs/apk -name "*.apk" -exec ls -la {} \;

          # With ABI splits enabled, Gradle produces separate APKs per architecture
          # plus one universal APK. Ship all of them so users on any device can pick
          # the small arch-specific one, with the universal APK as a safe fallback.
          UNIVERSAL=$(find android/app/build/outputs/apk -iname "*universal*.apk" | head -1)
          ARM64=$(find android/app/build/outputs/apk -iname "*arm64-v8a*.apk" | head -1)
          ARMV7=$(find android/app/build/outputs/apk -iname "*armeabi-v7a*.apk" | head -1)

          test -n "$UNIVERSAL" && cp "$UNIVERSAL" out/CDN-Hunter-v3-universal.apk
          test -n "$ARM64" && cp "$ARM64" out/CDN-Hunter-v3-arm64.apk
          test -n "$ARMV7" && cp "$ARMV7" out/CDN-Hunter-v3-armv7.apk

          # Fallback: if splits didn't produce the expected names, ship whatever was built.
          if [ ! -f out/CDN-Hunter-v3-universal.apk ] && [ ! -f out/CDN-Hunter-v3-arm64.apk ]; then
            APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
            test -n "$APK" && cp "$APK" out/CDN-Hunter-v3.apk
          fi

          ls -la out



      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.0-build${{ github.run_number }}
          name: CDN Hunter v3.0 (Build ${{ github.run_number }})
          body: |
            ## CDN Hunter v3.0 — VPN + Scanner

            Full Compose app with embedded Xray VPN engine.

            ### Features:
            - Xray VPN (trojan/vless/vmess)
            - TLS Fragmentation (bypass DPI)
            - CDN clean-IP scanner (Cloudflare/Fastly/Akamai)
            - Auto-IP (scan + apply best IP)
            - Traffic stats (upload/download)
            - Speed monitor

            ### Which file to download?
            - Most phones (made after ~2017): **CDN-Hunter-v3-arm64.apk** (smallest)
            - Older/32-bit phones: **CDN-Hunter-v3-armv7.apk**
            - Not sure / installer errors: **CDN-Hunter-v3-universal.apk** (works on any device, larger)
          files: out/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
