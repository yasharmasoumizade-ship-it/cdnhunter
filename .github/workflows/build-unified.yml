name: Build CDN Hunter (VPN + Scanner)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/build-unified.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Build libv2ray.aar (xray-core native)
        run: |
          git clone --depth 1 https://github.com/2dust/AndroidLibXrayLite.git xray-lib
          cd xray-lib
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile init
          go mod tidy -v
          gomobile bind -v -androidapi 21 -ldflags='-s -w' -o libv2ray.aar ./
          ls -la libv2ray.aar

      - name: Place .aar in app/libs
        run: |
          mkdir -p android/app/libs
          cp xray-lib/libv2ray.aar android/app/libs/
          ls -la android/app/libs/

      - name: Build hev-socks5-tunnel (.so)
        run: |
          git clone --depth 1 --recursive https://github.com/heiher/hev-socks5-tunnel.git
          cd hev-socks5-tunnel
          # Fix typedef redefinition error with NDK 27
          sed -i 's/typedef __kernel_fd_set fd_set;//g' third-part/lwip/src/ports/include/arch/../unix/include/cc.h || true
          find . -name "cc.h" -exec sed -i 's/typedef __kernel_fd_set fd_set;//g' {} \; || true
          # Build for arm64
          export ANDROID_NDK_HOME="${ANDROID_HOME}/ndk/$(ls ${ANDROID_HOME}/ndk/ | head -1)"
          if [ ! -d "$ANDROID_NDK_HOME" ]; then
            sdkmanager "ndk;26.1.10909125"
            export ANDROID_NDK_HOME="${ANDROID_HOME}/ndk/26.1.10909125"
          fi
          export CC="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang"
          export CROSS_PREFIX="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-"
          make clean || true
          make ENABLE_STATIC=1 CC="$CC" STRIP="${CROSS_PREFIX}strip" -j$(nproc)
          ls -la bin/
          cd ..

      - name: Place .so in jniLibs
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          cp hev-socks5-tunnel/bin/hev-socks5-tunnel android/app/src/main/jniLibs/arm64-v8a/libhev-socks5-tunnel.so
          ls -la android/app/src/main/jniLibs/arm64-v8a/

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o /tmp/gradle.zip
          unzip -qo /tmp/gradle.zip -d /tmp
          /tmp/gradle-8.5/bin/gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Collect APK
        run: |
          mkdir -p out
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "Found: $APK"
          test -n "$APK" && cp "$APK" out/CDN-Hunter-v3.apk
          ls -la out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CDN-Hunter-v3
          path: out/CDN-Hunter-v3.apk

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.0-build${{ github.run_number }}
          name: CDN Hunter v3.0 (Build ${{ github.run_number }})
          body: |
            ## CDN Hunter v3.0 — VPN + Scanner

            Full Compose app with embedded Xray VPN engine.

            ### Features:
            - Xray VPN (trojan/vless/vmess)
            - TLS Fragmentation (bypass DPI)
            - CDN clean-IP scanner (Cloudflare/Fastly/Akamai)
            - Auto-IP (scan + apply best IP)
            - Traffic stats (upload/download)
            - Speed monitor
          files: out/CDN-Hunter-v3.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
