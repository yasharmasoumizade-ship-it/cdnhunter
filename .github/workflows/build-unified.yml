name: Build CDN Hunter (VPN + Scanner)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'mihomo-mobile/**'
      - '.github/workflows/build-unified.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'

      - name: Install SDK + NDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;26.1.10909125"

      - name: Build libmihomo.aar (mihomo core, native)
        run: |
          set -euo pipefail
          cd mihomo-mobile
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile init
          go get golang.org/x/mobile/cmd/gomobile
          go mod tidy -v
          gomobile bind -v -androidapi 24 -ldflags='-s -w -checklinkname=0' -o libmihomo.aar .
          ls -la libmihomo.aar

      - name: Place .aar in app/libs
        run: |
          mkdir -p android/app/libs
          rm -f android/app/libs/libv2ray.aar
          cp mihomo-mobile/libmihomo.aar android/app/libs/
          ls -la android/app/libs/

      - name: Bundle mihomo geo assets
        run: |
          mkdir -p android/app/src/main/assets
          curl -sL "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb" -o android/app/src/main/assets/geoip.metadb
          curl -sL "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat" -o android/app/src/main/assets/geosite.dat
          rm -f android/app/src/main/assets/geoip.dat
          ls -la android/app/src/main/assets/

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o /tmp/gradle.zip
          unzip -qo /tmp/gradle.zip -d /tmp
          /tmp/gradle-8.5/bin/gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build Release APK
        working-directory: android
        env:
          CI_VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Collect APK
        run: |
          mkdir -p out
          find android/app/build/outputs/apk -name "*.apk" -exec ls -la {} \;

          UNIVERSAL=$(find android/app/build/outputs/apk -iname "*universal*.apk" | head -1)
          ARM64=$(find android/app/build/outputs/apk -iname "*arm64-v8a*.apk" | head -1)
          ARMV7=$(find android/app/build/outputs/apk -iname "*armeabi-v7a*.apk" | head -1)

          test -n "$UNIVERSAL" && cp "$UNIVERSAL" out/CDN-Hunter-v4-universal.apk
          test -n "$ARM64" && cp "$ARM64" out/CDN-Hunter-v4-arm64.apk
          test -n "$ARMV7" && cp "$ARMV7" out/CDN-Hunter-v4-armv7.apk

          if [ ! -f out/CDN-Hunter-v4-universal.apk ] && [ ! -f out/CDN-Hunter-v4-arm64.apk ]; then
            APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
            test -n "$APK" && cp "$APK" out/CDN-Hunter-v4.apk
          fi

          ls -la out

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v4.0-build${{ github.run_number }}
          name: CDN Hunter v4.0 (Build ${{ github.run_number }})
          body: |
            ## CDN Hunter v4.0 — VPN Client (mihomo core)

            Full Compose app now running on the embedded mihomo (Clash.Meta) core instead of Xray-core.

            ### Features:
            - mihomo/Clash.Meta engine — VLESS, VMess, Trojan, Shadowsocks, Hysteria2, TUIC, and everything else Clash.Meta supports
            - Native TUN handling via mihomo itself (no separate tun2socks step)
            - Server location (real IP-based geo lookup)
            - Traffic stats (upload/download)
            - Speed monitor

            ### Which file to download?
            - Most phones (made after ~2017): **CDN-Hunter-v4-arm64.apk**
            - Older/32-bit phones: **CDN-Hunter-v4-armv7.apk**
            - Not sure / installer errors: **CDN-Hunter-v4-universal.apk**
          files: out/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
