name: Build CDN Hunter (VPN + Scanner)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/build-unified.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'

      - name: Install SDK + NDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;26.1.10909125"

      - name: Build libv2ray.aar (xray-core native)
        run: |
          git clone --depth 1 https://github.com/2dust/AndroidLibXrayLite.git xray-lib
          cd xray-lib
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile init
          go mod tidy -v
          gomobile bind -v -androidapi 21 -ldflags='-s -w' -o libv2ray.aar ./
          ls -la libv2ray.aar

      - name: Place .aar in app/libs
        run: |
          mkdir -p android/app/libs
          cp xray-lib/libv2ray.aar android/app/libs/
          ls -la android/app/libs/

      - name: Get hev-socks5-tunnel .so from working Xray fork
        run: |
          git clone https://github.com/SaeedDev94/Xray.git xray-fork
          cd xray-fork
          git checkout 7effa2b8bfac129141526e335775ede916f2c96e
          git submodule update --init --recursive
          export PATH=$PATH:$(go env GOPATH)/bin
          chmod +x buildGo.sh 2>/dev/null || true
          ./buildGo.sh arm64
          export NDK="${ANDROID_HOME}/ndk/$(ls ${ANDROID_HOME}/ndk/ | head -1)"
          if [ ! -d "$NDK" ]; then
            sdkmanager "ndk;26.1.10909125"
            NDK="${ANDROID_HOME}/ndk/26.1.10909125"
          fi
          ${NDK}/ndk-build -C app/src/main/jni NDK_PROJECT_PATH=app/src/main NDK_LIBS_OUT=app/src/main/jniLibs APP_ABI=arm64-v8a -j$(nproc)
          SO_FILE=$(find . -name "libhev-socks5-tunnel.so" -path "*arm64*" | head -1)
          echo "Found: $SO_FILE"
          mkdir -p ../android/app/src/main/jniLibs/arm64-v8a
          cp "$SO_FILE" ../android/app/src/main/jniLibs/arm64-v8a/libhev-socks5-tunnel.so
          file ../android/app/src/main/jniLibs/arm64-v8a/libhev-socks5-tunnel.so
          cd ..
          rm -rf xray-fork

      - name: Clean jni source dir
        run: rm -rf android/app/src/main/jni

      - name: Bundle geoip/geosite assets
        run: |
          mkdir -p android/app/src/main/assets
          curl -sL "https://github.com/v2fly/geoip/releases/latest/download/geoip.dat" -o android/app/src/main/assets/geoip.dat
          curl -sL "https://github.com/v2fly/domain-list-community/releases/latest/download/dlc.dat" -o android/app/src/main/assets/geosite.dat
          ls -la android/app/src/main/assets/

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o /tmp/gradle.zip
          unzip -qo /tmp/gradle.zip -d /tmp
          /tmp/gradle-8.5/bin/gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Collect APK
        run: |
          mkdir -p out
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "Found: $APK"
          test -n "$APK" && cp "$APK" out/CDN-Hunter-v3.apk
          ls -la out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CDN-Hunter-v3
          path: out/CDN-Hunter-v3.apk

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.0-build${{ github.run_number }}
          name: CDN Hunter v3.0 (Build ${{ github.run_number }})
          body: |
            ## CDN Hunter v3.0 — VPN + Scanner

            Full Compose app with embedded Xray VPN engine.

            ### Features:
            - Xray VPN (trojan/vless/vmess)
            - TLS Fragmentation (bypass DPI)
            - CDN clean-IP scanner (Cloudflare/Fastly/Akamai)
            - Auto-IP (scan + apply best IP)
            - Traffic stats (upload/download)
            - Speed monitor
          files: out/CDN-Hunter-v3.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
