name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o /tmp/gradle.zip
          unzip -qo /tmp/gradle.zip -d /tmp
          /tmp/gradle-8.5/bin/gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk CDN-Hunter.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CDNHunter-APK
          path: CDN-Hunter.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.2-build${{ github.run_number }}
          name: CDN Hunter v2.2
          body: |
            ## CDN Hunter v2.2

            **Signed release APK** — no Play Protect popup.

            ### Install:
            1. Download `CDN-Hunter.apk`
            2. Open and install directly (no uninstall needed)
            3. All future updates install over this version smoothly

            ### Features:
            - Signed APK — no Play Protect warning
            - Better scan performance
            - Tap any IP to copy with haptic
            - Swipe between pages
            - Glass stat cards
          files: CDN-Hunter.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
