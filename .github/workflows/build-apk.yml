name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'

      - name: Install SDK packages
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0"

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o /tmp/gradle.zip
          unzip -qo /tmp/gradle.zip -d /tmp
          /tmp/gradle-8.5/bin/gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --info 2>&1 | tail -100

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk CDNHunter-v2.0.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CDNHunter-APK
          path: CDNHunter-v2.0.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0-build${{ github.run_number }}
          name: CDN Hunter v2.0 (Build ${{ github.run_number }})
          body: |
            ## CDN Hunter - Android APK

            Native Android app. No Termux needed.

            ### Install:
            1. Download CDNHunter-v2.0.apk
            2. Enable install from unknown sources
            3. Install and open

            ### Features:
            - Smart / Manual IP / CIDR scan
            - Akamai, Fastly, Cloudflare, Google, CloudFront, Gcore
            - Fronting verification
            - Iran IP filter
            - Throughput test
            - Dark UI
          files: CDNHunter-v2.0.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
