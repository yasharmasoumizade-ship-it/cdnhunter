name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o /tmp/gradle.zip
          unzip -qo /tmp/gradle.zip -d /tmp
          /tmp/gradle-8.5/bin/gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk CDNHunter-v2.1.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CDNHunter-APK
          path: CDNHunter-v2.1.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.1-build${{ github.run_number }}
          name: CDN Hunter v2.1 (Build ${{ github.run_number }})
          body: |
            ## CDN Hunter v2.1

            ### Install:
            1. Download CDNHunter-v2.1.apk
            2. Install (updates over v2.0 without errors)

            ### Changes from v2.0:
            - Better scan speed (connection pooling)
            - Tap IP to copy with haptic feedback
            - Glass stat cards
            - Swipe between pages
            - Fixed Play Protect warning
            - Smooth update over previous version
          files: CDNHunter-v2.1.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
