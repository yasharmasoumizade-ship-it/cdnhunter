name: Build VPN APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Clone Xray VPN (with submodules)
        run: |
          git clone https://github.com/SaeedDev94/Xray.git app-src
          cd app-src
          git submodule update --init --recursive

      - name: Build native (XrayCore.aar + XrayHelper)
        working-directory: app-src
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          chmod +x buildGo.sh buildXrayCore.sh buildXrayHelper.sh 2>/dev/null || true
          ./buildGo.sh arm64

      - name: Build Debug APK (arm64)
        working-directory: app-src
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug -PabiId=2 -PabiTarget=arm64-v8a --no-daemon --stacktrace

      - name: Find and upload APK
        run: |
          find app-src -name "*.apk" -path "*debug*"
          mkdir -p out
          find app-src -name "*.apk" -path "*debug*" -exec cp {} out/ \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vpn-apk
          path: out/*.apk
